<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DocSpace: Documentação como ativo estratégico de negócio. Por Fabiana Nonjah.">
    <title>Fabiana Nonjah | Senior Tech Writer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root { --primary: #6366f1; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; background-color: #020617; color: #f8fafc; scroll-behavior: smooth; }
        
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }
        
        /* LOGO E TAGLINE */
        .logo-container { display: flex; flex-direction: column; }
        .logo-text { font-weight: 800; font-size: 1.6rem; letter-spacing: -0.04em; display: flex; align-items: center; color: white; line-height: 1; }
        .logo-cursor { width: 3px; height: 1.4rem; background-color: var(--primary); margin-left: 2px; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* TAGLINE COM ESPAÇO ENTRELINHAS (EXCLUSIVA ÁREAS LOGADAS) */
        .tagline { font-size: 0.65rem; color: #64748b; font-weight: 600; margin-top: 10px; text-transform: uppercase; letter-spacing: 0.05em; }

        /* MENU CENTRALIZADO NO HEADER */
        .nav-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 40px; }
        .nav-link { font-size: 0.8rem; font-weight: 700; color: #94a3b8; transition: 0.2s; white-space: nowrap; }
        .nav-link:hover { color: #f8fafc; }
        .nav-explorar { color: #ef4444; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 900; pointer-events: none; }

        /* FOTO DE PERFIL ALINHADA AO TEXTO */
        .profile-circle { width: 340px; height: 340px; border-radius: 50%; object-fit: cover; border: 4px solid #1e293b; filter: grayscale(100%); transition: 0.6s; }
        .profile-circle:hover { filter: grayscale(0%); transform: scale(1.02); border-color: var(--primary); }

        /* RODAPÉ SEM ESPAÇO GIGANTE (FLEXBOX CONTROLADO) */
        .footer-container { display: flex; justify-content: space-between; align-items: flex-start; max-width: 1000px; margin: 0 auto; width: 100%; }
        @media (max-width: 768px) { .footer-container { flex-direction: column; gap: 40px; text-align: center; align-items: center; } }
    </style>
</head>
