<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocSpace | Gestão de Conhecimento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .sidebar { background-color: #1e293b; transition: 0.3s; }
        .active-env { border-left: 4px solid #6366f1; background: #334155; }
    </style>
</head>
<body>
    <div id="app" class="flex h-screen overflow-hidden">
        <!-- O código do Layout que te mostrei antes entra aqui formatado para HTML puro -->
        <aside class="w-64 sidebar flex flex-col border-r border-slate-800">
            <div class="p-6 font-bold text-xl text-indigo-400 border-b border-slate-800">DocSpace</div>
            <nav class="flex-1 p-4 space-y-2">
                <div onclick="changeEnv('port')" class="p-3 cursor-pointer hover:bg-slate-700 rounded">Portfolio</div>
                <div onclick="changeEnv('docs')" class="p-3 cursor-pointer hover:bg-slate-700 rounded">Docs SaaS</div>
                <div onclick="changeEnv('course')" class="p-3 cursor-pointer hover:bg-slate-700 rounded">Academy</div>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col">
            <header class="h-16 border-b border-slate-800 flex items-center px-8 justify-between">
                <input type="text" placeholder="Busca global..." class="bg-slate-900 border border-slate-700 rounded-full px-4 py-1 text-sm w-64">
                <div id="user-area">Login</div>
            </header>
            <section id="content" class="flex-1 p-10 overflow-y-auto">
                <h1 class="text-3xl font-bold">Bem-vindo ao DocSpace</h1>
                <p class="mt-4 text-slate-400">Selecione um ambiente ao lado para começar.</p>
            </section>
        </main>
    </div>

    <script>
        // Aqui você colará as chaves que o Supabase vai te dar
        const SUPABASE_URL = 'https://eazqkdyqqfffzlwaojbp.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_9ytsES7Dg4enpHJdbnqPwQ_ANUTNLR0';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function changeEnv(env) {
            const content = document.getElementById('content');
            if(env === 'port') {
                content.innerHTML = "<h1>Meu Portfólio</h1><p>Carregando cases...</p>";
            } // ... lógica para os outros ambientes
        }
    </script>
</body>
</html>
